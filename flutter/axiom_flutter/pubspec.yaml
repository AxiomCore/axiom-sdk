name: axiom_flutter
description: "Axiom Flutter SDK"
version: 0.0.8
homepage: https://github.com/AxiomCore/axiom-sdk
repository: https://github.com/AxiomCore/axiom-sdk
issue_tracker: https://github.com/AxiomCore/axiom-sdk/issues

environment:
  sdk: ^3.8.0
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.4
  path_provider: ^2.1.5
  ansicolor: ^2.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  plugin:
    platforms:
      ios:
        pluginClass: AxiomFlutterPlugin
      macos:
        pluginClass: AxiomFlutterPlugin