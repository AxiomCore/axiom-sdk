name: axiom_flutter
description: Flutter bridge for AxiomRuntime
version: 0.1.0

environment:
  sdk: ^3.8.0
  flutter: ">=3.0.0"

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: AxiomRuntimePlugin

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.4
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^5.0.0
